output_template:
  content: "[Project Name]\n\n[ระบุชื่อโปรเจกต์ที่นี่ และเขียนคำอธิบายสั้นๆ 1 ประโยคว่าแอปพลิเคชันนี้ทำอะไรและมีประโยชน์อย่างไรสำหรับผู้ใช้]\n\nEnvironment\n- OS: [ระบุ OS และเวอร์ชันที่ตรวจพบ]\n- Shell/CLI: [เช่น Bash 5.2, Zsh 5.9]\n- Tools Installed:  \n  - Node.js vXX (ตำแหน่ง: [ผลลัพธ์จาก which/where])  \n  - npm vXX  \n  - Python vXX  \n  - Rust vXX  \n  - Git vXX  \n  - Docker vXX  \n  - Others: [...]\n\nRun & Operate\n- [คำสั่งสำหรับรัน Development Mode] — [อธิบายส่วนที่รัน เช่น API หรือ Frontend]\n- [คำสั่งสำหรับ Build] — [อธิบายขั้นตอนการ Build โปรเจกต์]\n- [คำสั่งสำหรับการจัดการฐานข้อมูล] — [อธิบายวิธีการจัดการ Schema หรือ Migration]\n- Required env: [ระบุชื่อ Environment Variables ที่จำเป็น] — [เช่น Database URL, API Keys]\n\nStack\n- Runtime/Language: [...]\n- Framework: [...]\n- Database: [...]\n- ORM/Query Builder: [...]\n- Others: [...]\n\nWhere things live\n[ระบุตำแหน่งไฟล์สำคัญที่เป็น Source of Truth เช่น ไฟล์กำหนด Schema ฐานข้อมูล, ไฟล์สัญญา API หรือไฟล์ตั้งค่าหลัก]\n\nArchitecture decisions\n[ระบุการตัดสินใจในการออกแบบระบบที่สำคัญ เช่น การเลือกใช้ Architecture แบบใด หรือเหตุผลเบื้องหลังการเลือกใช้เทคโนโลยีนั้นๆ]\n\nProduct\n[อธิบายฟีเจอร์หลักหรือความสามารถของแอปพลิเคชันในมุมมองของผู้ใช้งาน]\n\nUser preferences\n[บันทึกความต้องการพิเศษหรือคำสั่งเฉพาะจากผู้ใช้ที่ต้องคำนึงถึงในการพัฒนา]\n\nGotchas\n[ระบุข้อควรระวัง จุดที่มักเกิดข้อผิดพลาดได้ง่าย หรือลำดับขั้นตอนสำคัญที่ต้องทำตามอย่างเคร่งครัด]\n\nIssues & Troubleshooting\n- [ชื่อปัญหา]  \n  - Symptom: [อธิบายอาการ]  \n  - Line Reference: [ไฟล์และบรรทัดที่เกิดปัญหา เช่น src/index.js:42]  \n  - Possible Cause: [สาเหตุที่คาดว่าเป็นไปได้]  \n  - Resolution: [แนวทางแก้ไขที่ใช้แล้วหรือแนะนำ]  \n  - Recommendations: [ข้อเสนอแนะเพิ่มเติม เช่น ปรับ config, ใช้เวอร์ชันอื่น]  \n\nResolved Issues Archive\n- [ชื่อปัญหาที่แก้ไขแล้ว]  \n  - Resolved on: [วันที่]  \n  - Resolution: [วิธีแก้ไขที่ใช้จริง]  \n  - Note: [บริบทเพิ่มเติม เช่น สาเหตุที่แท้จริงหรือสิ่งที่ควรระวังในอนาคต]\n\nPointers\n- [ระบุตำแหน่งไฟล์คู่มือ หรือลิงก์ทรัพยากরอื่นๆ ที่เกี่ยวข้องภายใน Workspace]"
  format: markdown
workflow:
  loop_restart: |-
    **รอบใหม่ (Loop Restart)**
    - เริ่มใหม่ที่ Step 0
    - ถ้าแก้ไขแล้ว → ย้ายไป Resolved Issues Archive หรือ ลบออก
    - Commit การเปลี่ยนแปลงใน Version Control พร้อมข้อความชัดเจน
  restart: '0'
  rules: "คำสั่งนี้ต้องทำทุกครั้งที่เริ่มรอบการทำงานใหม่  \nหากขั้นตอนไม่ถูกระบุ → ไม่ต้องทำ  \nหากเจอเงื่อนไขที่ไม่สามารถไปต่อได้ → ต้องหยุดและถามคำแนะนำทันที  \nCritical: ขั้นตอนที่มีเครื่องหมาย Critical ต้องทำอย่างเคร่งครัด ห้ามข้าม"
  steps:
  - content: |-
      **Step 0: ตรวจสอบ Git Directory**
      - รัน `git rev-parse --is-inside-work-tree`
      - ถ้าเป็น Git directory → ไป Step 1
      - ถ้าไม่ใช่ Git directory → ไป Step 1A
    critical: true
    id: '0'
    next: null
  - content: |-
      **Step 1: ตรวจสอบโครงสร้างโปรเจกต์**
      - รัน `ls -R` หรือ `tree`
      - บันทึกโครงสร้างลง SPEC.md โดยต้องใส่ว่าแต่ละโฟลเดอร์ใช้ทำอะไร เช่น:
        - docs/* → เอกสาร
        - scripts/* → สคริปต์
        - src/* → source code
        - tests/* → ไฟล์ทดสอบ
        - config/* → ไฟล์ตั้งค่า
        - assets/* → รูปภาพ/สื่อประกอบ
        - data/* → ข้อมูลดิบ
      - ตรวจสอบไฟล์สำคัญ:
        - .gitignore → บันทึกสิ่งที่ ignore
        - .env → บันทึก environment variables ถ้ามี
        - .editorconfig, .prettierrc, .eslintrc → บันทึก config ถ้ามี
        - Manifest (package.json, cargo.toml, requirements.txt) → บันทึก dependencies
      - ถ้าไฟล์หรือโฟลเดอร์ไม่พบ → บันทึกว่า “ไม่มี” ลง SPEC.md
    critical: true
    id: '1'
    next: null
  - content: |-
      **Step 1A: ตรวจสอบโครงสร้างโปรเจกต์ที่ไม่ใช่งานโค้ดดิ้ง**
      - รัน `ls -R` หรือ `tree`
      - บันทึกโครงสร้างลง SPEC.md โดยต้องใส่ว่าแต่ละโฟลเดอร์ใช้ทำอะไร เช่น:
        - docs/* → รายงาน/บทความ
        - assets/* → รูปภาพ/สื่อประกอบ
        - data/* → ข้อมูลดิบ
      - ตรวจสอบไฟล์สำคัญ:
        - .gitignore → บันทึกสิ่งที่ ignore ถ้ามี
        - ไฟล์ config (.editorconfig, .prettierrc) → บันทึกถ้ามี
      - ถ้าไม่มี → บันทึกว่า “ไม่มี” ลง SPEC.md
    critical: true
    id: 1A
    next: null
  - content: |-
      **Step 2: ตรวจสอบโค้ด**
      - เปิดไฟล์ entry point เช่น src/index.js, main.py
      - รันไฟล์ด้วยคำสั่งจริง (node, python3, cargo build)
      - ถ้า error → บันทึก Symptom + Line Reference ลง SPEC.md
      - ถ้าไม่มีโค้ด → บันทึกว่า “ไม่มีโค้ด”
      - ตรวจสอบไฟล์ทดสอบ (tests/*) → รัน npm test, pytest, หรือ cargo test แล้วบันทึกผล
    critical: true
    id: '2'
    next: null
  - content: |-
      **Step 3: ตรวจสอบสภาพแวดล้อม (Environment & OS Check)**
      - ตรวจสอบ OS และเวอร์ชัน
      - ตรวจสอบ Shell/CLI
      - ตรวจสอบ Node.js และตำแหน่งไฟล์ (which node หรือ where node)
      - ตรวจสอบเครื่องมืออื่น ๆ เช่น Python, Rust, Git, Docker
      - ถ้าไม่พบ → บันทึกว่า “ไม่มี” ลง SPEC.md
    critical: true
    id: '3'
    next: null
  - content: |-
      **Step 4: Plan Mode & Permission**
      - สรุปสิ่งที่ตรวจพบ (โครงสร้าง, โค้ด, OS, Tools, SPEC.md เดิม)
      - ถ้ามี SPEC.md เดิม → เตรียมอัปเดต
      - ถ้าไม่มี SPEC.md → เตรียมสร้างใหม่
      - ถ้าเป็นโปรเจกต์ใหม่และข้อมูลไม่พอ → ตั้งคำถามกลับ
      - ขออนุญาตผู้ใช้ก่อนเขียนหรือแก้ไข SPEC.md
      - ถ้าไม่ได้รับอนุญาต → หยุด
    critical: true
    id: '4'
    next: null
  - content: |-
      **Step 5: Execution (Exit Plan Mode)**
      - ถ้าได้รับอนุญาต:
        - สร้าง SPEC.md ใหม่ตามเทมเพลต
        - หรือ อัปเดต SPEC.md เดิม
      - ถ้า error → บันทึกลง SPEC.md พร้อม Line Reference
    critical: true
    id: '5'
    next: null
  - content: |-
      **Step 6: Issues & Troubleshooting**
      - ทุกปัญหาต้องบันทึกลง SPEC.md:
        - Symptom
        - Line Reference
        - Possible Cause
        - Resolution
        - Recommendations
      - ถ้าแก้ไขไม่ได้ทันที → บันทึกว่า “ยังไม่แก้ไข”
    critical: true
    id: '6'
    next: null
  title: การจัดการไฟล์ SPEC.md
